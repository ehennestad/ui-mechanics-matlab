# MATLAB Toolbox Settings
matlab_toolbox:
  namespace_name: uim
  toolbox_name: UI Mechanics for MATLAB
  author_name: Eivind Hennestad
  author_email: eivihe@uio.no
  author_company: University of Oslo
  toolbox_summary: Composable controls and interactions for MATLAB figures.
  toolbox_description: |
    UI Mechanics (uim) provides reusable interface components and interaction infrastructure for programmatic MATLAB applications. It is designed for scientific viewers, image tools and other graphics-heavy apps that need controls and pointer interactions tightly integrated with plotted data.
    The toolbox includes composable controls, toolbars, message overlays, layout utilities, styling, and tools for zooming, panning, selection and data interaction. Its core is designed to work across traditional MATLAB figures and modern UI figures without depending on a larger application framework.
  dependencies:
    - MATLAB
    - Image Processing Toolbox

